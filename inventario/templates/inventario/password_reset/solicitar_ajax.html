{% if success %}
<div class="text-center">
    <div class="mb-4">
        <svg class="mx-auto h-12 w-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
    </div>
    <h3 class="text-lg font-medium text-gray-900 mb-2">✅ Correo Enviado</h3>
    <p class="text-sm text-gray-600 mb-4">{{ message }}</p>
    <p class="text-xs text-gray-500">Revisa tu bandeja de entrada y carpeta de spam.</p>
    <button onclick="cerrarModal()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
        Cerrar
    </button>
</div>
{% else %}
<div class="text-center">
    <div class="mb-4">
        <svg class="mx-auto h-12 w-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
    </div>
    <h3 class="text-lg font-medium text-gray-900 mb-2">❌ Error</h3>
    {% if error %}
        <p class="text-sm text-red-600 mb-4">{{ error }}</p>
    {% endif %}
    {% if errors %}
        <ul class="text-sm text-red-600 mb-4 text-left max-w-md mx-auto">
            {% for error in errors %}
                <li>• {{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    <button onclick="volverFormulario()" class="mt-4 px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700">
        Volver a Intentar
    </button>
</div>
{% endif %}
