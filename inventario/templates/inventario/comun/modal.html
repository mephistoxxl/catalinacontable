<!-- Modal global: selector de cantidad (reemplaza prompt del navegador) -->
<div id="catalina-cantidad-modal" class="fixed inset-0 z-[9999] hidden" aria-hidden="true">
	<style>
		/* Ocultar spinners del input number */
		#catalina-cantidad-input::-webkit-outer-spin-button,
		#catalina-cantidad-input::-webkit-inner-spin-button {
			-webkit-appearance: none;
			margin: 0;
		}
		#catalina-cantidad-input {
			-moz-appearance: textfield;
		}
	</style>
	<div class="absolute inset-0 bg-black/50"></div>
	<div class="relative min-h-full flex items-center justify-center p-4">
		<div class="w-full max-w-sm rounded-2xl bg-white shadow-2xl border border-gray-200 overflow-hidden">
			<div class="px-5 py-4 border-b border-gray-200 bg-gray-50">
				<div class="flex items-center justify-between">
					<h3 id="catalina-cantidad-title" class="text-base font-bold text-gray-900">Ingrese la cantidad</h3>
					<button type="button" id="catalina-cantidad-close" class="text-gray-500 hover:text-gray-800" aria-label="Cerrar">
						<i class="fa fa-times"></i>
					</button>
				</div>
			</div>

			<div class="px-5 py-5">
				<label for="catalina-cantidad-input" class="block text-sm font-semibold text-gray-800 mb-2">
					Cantidad
				</label>
				<div class="flex items-stretch gap-2">
					<button type="button" id="catalina-cantidad-minus"
								class="w-12 rounded-xl border border-gray-300 bg-white hover:bg-gray-50 text-gray-900 font-black text-lg">
						-
					</button>
					<input id="catalina-cantidad-input" type="number" inputmode="numeric" min="1" step="1"
								 class="flex-1 text-center px-3 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-gray-400 focus:border-transparent text-lg font-bold">
					<button type="button" id="catalina-cantidad-plus"
								class="w-12 rounded-xl border border-gray-300 bg-white hover:bg-gray-50 text-gray-900 font-black text-lg">
						+
					</button>
				</div>
				<p class="mt-2 text-xs text-gray-500">Usa +/− o escribe el valor.</p>
				<p id="catalina-cantidad-error" class="mt-2 text-sm text-red-600 hidden"></p>
			</div>

			<div class="px-5 py-4 border-t border-gray-200 bg-white flex items-center justify-end gap-2">
				<button type="button" id="catalina-cantidad-accept"
							class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-black hover:bg-gray-800 text-sm font-bold text-white">
					Aceptar
				</button>
				<button type="button" id="catalina-cantidad-cancel"
							class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-red-600 hover:bg-red-700 text-sm font-bold text-white">
					Cancelar
				</button>
			</div>
		</div>
	</div>
</div>

<script>
	(function () {
		const modal = document.getElementById('catalina-cantidad-modal');
		const titleEl = document.getElementById('catalina-cantidad-title');
		const inputEl = document.getElementById('catalina-cantidad-input');
		const errorEl = document.getElementById('catalina-cantidad-error');
		const btnAccept = document.getElementById('catalina-cantidad-accept');
		const btnCancel = document.getElementById('catalina-cantidad-cancel');
		const btnClose = document.getElementById('catalina-cantidad-close');
		const btnMinus = document.getElementById('catalina-cantidad-minus');
		const btnPlus = document.getElementById('catalina-cantidad-plus');

		if (!modal || !titleEl || !inputEl || !errorEl || !btnAccept || !btnCancel || !btnClose || !btnMinus || !btnPlus) {
			return;
		}

		let activeResolve = null;
		let activeOptions = null;

		function showError(msg) {
			if (!msg) {
				errorEl.textContent = '';
				errorEl.classList.add('hidden');
				return;
			}
			errorEl.textContent = msg;
			errorEl.classList.remove('hidden');
		}

		function closeModal(result) {
			modal.classList.add('hidden');
			modal.setAttribute('aria-hidden', 'true');
			showError('');
			const resolve = activeResolve;
			activeResolve = null;
			activeOptions = null;
			if (typeof resolve === 'function') resolve(result);
		}

		function openModal(options) {
			activeOptions = options;
			titleEl.textContent = options.title || 'Ingrese la cantidad';

			const allowDecimals = !!options.allowDecimals;
			const min = typeof options.min === 'number' ? options.min : 1;
			const step = options.step != null ? options.step : (allowDecimals ? '0.000001' : 1);

			inputEl.min = String(min);
			inputEl.step = String(step);
			inputEl.inputMode = allowDecimals ? 'decimal' : 'numeric';
			inputEl.value = String(options.defaultValue ?? 1);

			modal.classList.remove('hidden');
			modal.setAttribute('aria-hidden', 'false');
			setTimeout(() => {
				try {
					inputEl.focus();
					inputEl.select();
				} catch (e) {}
			}, 0);
		}

		function stepValue(delta) {
			const allowDecimals = !!(activeOptions && activeOptions.allowDecimals);
			const raw = String(inputEl.value ?? '').trim();
			const current = raw ? Number(raw) : (allowDecimals ? 0 : 0);
			const min = (activeOptions && typeof activeOptions.min === 'number') ? activeOptions.min : 1;
			const stepRaw = (activeOptions && activeOptions.step != null) ? activeOptions.step : (allowDecimals ? 1 : 1);
			const step = Number(stepRaw);
			const safeStep = Number.isFinite(step) && step > 0 ? step : 1;

			let next = (Number.isFinite(current) ? current : 0) + (delta * safeStep);
			if (next < min) next = min;
			// Mantener precisión en decimales
			if (allowDecimals) {
				next = Math.round((next + Number.EPSILON) * 1e6) / 1e6;
			} else {
				next = Math.round(next);
			}
			inputEl.value = String(next);
			showError('');
		}

		function validateAndGetValue() {
			const raw = String(inputEl.value ?? '').trim();
			if (!raw) {
				showError('Ingrese una cantidad.');
				return null;
			}

			const allowDecimals = !!(activeOptions && activeOptions.allowDecimals);
			const value = allowDecimals ? Number(raw) : parseInt(raw, 10);
			if (!Number.isFinite(value)) {
				showError('Ingrese una cantidad válida.');
				return null;
			}
			const min = (activeOptions && typeof activeOptions.min === 'number') ? activeOptions.min : 1;
			if (value < min) {
				showError(`La cantidad mínima es ${min}.`);
				return null;
			}
			showError('');
			return value;
		}

		btnAccept.addEventListener('click', () => {
			const value = validateAndGetValue();
			if (value == null) return;
			closeModal(value);
		});

		btnMinus.addEventListener('click', () => stepValue(-1));
		btnPlus.addEventListener('click', () => stepValue(1));

		function cancel() {
			closeModal(null);
		}

		btnCancel.addEventListener('click', cancel);
		btnClose.addEventListener('click', cancel);

		modal.addEventListener('click', (e) => {
			// click outside card
			if (e.target === modal || (e.target && e.target.classList && e.target.classList.contains('bg-black/50'))) {
				cancel();
			}
		});

		document.addEventListener('keydown', (e) => {
			if (modal.classList.contains('hidden')) return;
			if (e.key === 'Escape') {
				e.preventDefault();
				cancel();
			}
			if (e.key === 'Enter') {
				// Enter to accept
				const value = validateAndGetValue();
				if (value == null) return;
				e.preventDefault();
				closeModal(value);
			}
		});

		// API global
		window.catalinaSolicitarCantidad = function (options) {
			return new Promise((resolve) => {
				// Si hay una solicitud activa, se cancela (evita colisiones)
				if (activeResolve) {
					try { activeResolve(null); } catch (e) {}
				}
				activeResolve = resolve;
				openModal(options || {});
			});
		};
	})();
</script>
