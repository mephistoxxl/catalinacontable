{% extends "inventario/comun/base.html" %}

{% block content %}

<div class="bg-gray-50 p-2 pl-4">
  <div class="max-w-7xl mx-auto">

    <div class="bg-gradient-to-r from-gray-800 to-gray-900 px-3 py-1.5 rounded-lg mb-2">
      <div class="flex items-center">
        <i class="fa fa-bar-chart text-white text-sm"></i>
        <h2 class="ml-2 text-sm font-semibold text-white">Reportes</h2>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-lg border border-gray-200">
      <form method="get" class="p-2.5 pl-3">

        <!-- Fila superior: Periodo / Orden / Agrupar / Imprimir -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-2">

          <div class="lg:col-span-3">
            <div class="border border-gray-300 rounded p-2">
              <div class="text-[11px] font-semibold text-gray-800 mb-1.5">Periodo Fechas</div>
              <div>
                <input
                  id="rango_fechas"
                  type="text"
                  class="w-full min-w-0 border border-gray-300 rounded px-2 py-1 text-xs"
                  autocomplete="off"
                />
                <input type="hidden" id="desde" name="desde" value="{{ desde_ui|default:'' }}" />
                <input type="hidden" id="hasta" name="hasta" value="{{ hasta_ui|default:'' }}" />
              </div>
            </div>
          </div>

          <div class="lg:col-span-3">
            <div class="border border-gray-300 rounded p-2">
              <div class="text-[11px] font-semibold text-gray-800 mb-1.5">Ordenado por:</div>
              <div class="space-y-0.5">
                <label class="flex items-center gap-2 text-xs text-gray-800">
                  <input type="radio" name="ordenado_por" value="secuencia" checked />
                  Secuencia
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800">
                  <input type="radio" name="ordenado_por" value="fecha" />
                  Fecha
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800">
                  <input type="radio" name="ordenado_por" value="cliente" />
                  Cliente
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-2">
            <div class="border border-gray-300 rounded p-2">
              <div class="text-[11px] font-semibold text-gray-800 mb-1.5">Agrupado por:</div>
              <div class="space-y-0.5">
                <label class="flex items-center gap-2 text-xs text-gray-800">
                  <input type="radio" name="agrupado_por" value="ninguno" checked />
                  Ninguno
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800">
                  <input type="radio" name="agrupado_por" value="clientes" />
                  Clientes
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4">
            <div class="flex items-start justify-between gap-2">
              <div class="flex flex-col">
                <button type="submit" name="accion" value="imprimir" class="inline-flex items-center justify-center px-4 py-1.5 bg-black text-white text-xs font-medium rounded">
                  <i class="fa fa-print mr-1.5 text-xs"></i>
                  Imprimir
                </button>
              </div>

              <div class="flex flex-col gap-1">
                <label class="flex items-center gap-2 text-xs text-gray-800">
                  <input type="checkbox" name="informe_resumido" />
                  Informe Resumido
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800">
                  <input type="checkbox" name="exportar_excel" />
                  Exportar a Excel
                </label>
              </div>
            </div>
          </div>

        </div>

        <!-- Filtros: CI/RUC + búsqueda -->
        <div class="mt-2 grid grid-cols-1 lg:grid-cols-12 gap-2">
          <div class="lg:col-span-4">
            <div class="flex items-center gap-2">
              <label class="text-xs text-gray-800 whitespace-nowrap">C.I/RUC:</label>
              <input type="text" name="ci_ruc" class="flex-1 border border-gray-300 rounded px-2 py-1 text-xs" />
              <button type="submit" name="accion" value="buscar" class="px-2 py-1 border border-gray-300 rounded bg-gray-100">
                <i class="fa fa-search text-gray-700 text-xs"></i>
              </button>
            </div>
          </div>
          <div class="lg:col-span-8">
            <input type="text" name="cliente_nombre" class="w-full border border-gray-300 rounded px-2 py-1 text-xs bg-gray-100" placeholder="" readonly />
          </div>
        </div>

        <!-- Tipo de facturación / Secuencia inicia -->
        <div class="mt-2 grid grid-cols-1 lg:grid-cols-12 gap-2">
          <div class="lg:col-span-6">
            <div class="flex items-center gap-2">
              <label class="text-xs text-gray-800 whitespace-nowrap">Tipo de Facturación:</label>
              <select name="tipo_facturacion" class="w-full border border-gray-300 rounded px-2 py-1 text-xs">
                <option value="todas" selected>Todas</option>
              </select>
            </div>
          </div>
          <div class="lg:col-span-6">
            <div class="flex items-center gap-2">
              <label class="text-xs text-gray-800 whitespace-nowrap">Secuencia inicia en:</label>
              <input type="text" name="secuencia_inicia" class="w-full border border-gray-300 rounded px-2 py-1 text-xs" />
            </div>
          </div>
        </div>

        <!-- Grillas -->
        <div class="mt-2 grid grid-cols-1 lg:grid-cols-12 gap-2">

          <div class="lg:col-span-4">
            <div class="border border-gray-300 rounded">
              <div class="flex items-center justify-between px-2 py-1.5 border-b border-gray-300">
                <div class="text-xs font-semibold text-gray-800">Almacenes</div>
                <i class="fa fa-filter text-gray-600 text-xs"></i>
              </div>
              <div class="p-1.5">
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="almacenes" value="almacen_general" />
                  Almacén General
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4">
            <div class="border border-gray-300 rounded">
              <div class="flex items-center justify-between px-2 py-1.5 border-b border-gray-300">
                <div class="text-xs font-semibold text-gray-800">Secuencias</div>
                <i class="fa fa-bars text-gray-600 text-xs"></i>
              </div>
              <div class="p-1.5 space-y-0.5">
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="secuencias" value="facturas_electronicas" />
                  Facturas Electrónicas
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="secuencias" value="notas_credito_electronicas" />
                  Notas de Crédito Electrónicas
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="secuencias" value="notas_debito_electronicas" />
                  Notas de Débito Electrónicas
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4">
            <div class="border border-gray-300 rounded">
              <div class="flex items-center justify-between px-2 py-1.5 border-b border-gray-300">
                <div class="text-xs font-semibold text-gray-800">Forma de Pago</div>
                <i class="fa fa-bars text-gray-600 text-xs"></i>
              </div>
              <div class="p-1.5 space-y-0.5">
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="formas_pago" value="efectivo" />
                  Efectivo
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="formas_pago" value="credito" />
                  Crédito
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="formas_pago" value="cheque" />
                  Cheque
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="formas_pago" value="tarjeta_credito" />
                  Tarjeta de Crédito
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="formas_pago" value="deposito" />
                  Depósito
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4">
            <div class="border border-gray-300 rounded">
              <div class="flex items-center justify-between px-2 py-1.5 border-b border-gray-300">
                <div class="text-xs font-semibold text-gray-800">Facturadores</div>
                <i class="fa fa-filter text-gray-600 text-xs"></i>
              </div>
              <div class="p-1.5 space-y-0.5">
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="facturadores" value="vendedor" />
                  Vendedor
                </label>
                <label class="flex items-center gap-2 text-xs text-gray-800 px-1.5 py-0.5">
                  <input type="checkbox" name="facturadores" value="adm" />
                  ADM
                </label>
              </div>
            </div>
          </div>

        </div>

      </form>
    </div>

  </div>
</div>

{% endblock %}

{% block extra_js %}
  {{ block.super }}

  <!-- Date range picker (tipo captura: Hoy/Ayer/Esta semana/...) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css">
  <style>
    /* Verde para selección (daterangepicker) */
    .daterangepicker td.in-range {
      background-color: #bbf7d0; /* verde suave */
    }
    .daterangepicker td.active,
    .daterangepicker td.active:hover,
    .daterangepicker td.start-date,
    .daterangepicker td.end-date {
      background-color: #16a34a !important; /* verde */
      border-color: #16a34a !important;
      color: #fff !important;
    }
    .daterangepicker .ranges li.active {
      background-color: #16a34a !important;
      color: #fff !important;
    }
    .daterangepicker .drp-buttons .btn.applyBtn {
      background-color: #16a34a !important;
      border-color: #16a34a !important;
      color: #fff !important;
    }
    .daterangepicker .drp-buttons .btn.applyBtn:hover {
      background-color: #15803d !important;
      border-color: #15803d !important;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>

  <script>
    (function () {
      function safeParseISO(value) {
        if (!value) return null;
        var m = moment(value, 'YYYY-MM-DD', true);
        return m.isValid() ? m : null;
      }

      var $input = $('#rango_fechas');
      if (!$input.length || typeof $input.daterangepicker !== 'function') return;

      var $desde = $('#desde');
      var $hasta = $('#hasta');

      var start = safeParseISO($desde.val()) || moment();
      var end = safeParseISO($hasta.val()) || moment();

      moment.locale('es');

      function setHidden(s, e) {
        $desde.val(s.format('YYYY-MM-DD'));
        $hasta.val(e.format('YYYY-MM-DD'));
        $input.val(s.format('DD/MM/YYYY') + ' - ' + e.format('DD/MM/YYYY'));
      }

      $input.daterangepicker({
        autoUpdateInput: false,
        showDropdowns: true,
        startDate: start,
        endDate: end,
        opens: 'center',
        locale: {
          format: 'DD/MM/YYYY',
          separator: ' - ',
          applyLabel: 'Aplicar',
          cancelLabel: 'Cancelar',
          fromLabel: 'Desde',
          toLabel: 'Hasta',
          customRangeLabel: 'Personalizado',
          weekLabel: 'S',
          daysOfWeek: ['D', 'L', 'M', 'M', 'J', 'V', 'S'],
          monthNames: ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'],
          firstDay: 1
        },
        ranges: {
          'Hoy': [moment(), moment()],
          'Ayer': [moment().subtract(1, 'days'), moment().subtract(1, 'days')],
          'Esta semana': [moment().startOf('week').add(1, 'days'), moment().endOf('week').add(1, 'days')],
          'Los últimos 7 días': [moment().subtract(6, 'days'), moment()],
          'La semana pasada': [moment().subtract(1, 'week').startOf('week').add(1, 'days'), moment().subtract(1, 'week').endOf('week').add(1, 'days')],
          'Últimos 14 días': [moment().subtract(13, 'days'), moment()],
          'Este mes': [moment().startOf('month'), moment().endOf('month')],
          'Últimos 30 días': [moment().subtract(29, 'days'), moment()],
          'Mes pasado': [moment().subtract(1, 'month').startOf('month'), moment().subtract(1, 'month').endOf('month')],
          'El año actual': [moment().startOf('year'), moment().endOf('year')],
          'Año Anterior': [moment().subtract(1, 'year').startOf('year'), moment().subtract(1, 'year').endOf('year')]
        }
      });

      $input.on('apply.daterangepicker', function(ev, picker) {
        setHidden(picker.startDate, picker.endDate);
      });

      $input.on('cancel.daterangepicker', function() {
        // Mantener valores actuales (no limpiar)
        setHidden(start, end);
      });

      // Inicializar input visible
      setHidden(start, end);
    })();
  </script>
{% endblock %}
