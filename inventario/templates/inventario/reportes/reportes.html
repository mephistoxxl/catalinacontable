{% extends "inventario/comun/base.html" %}

{% block content %}

<div class="bg-gray-50 p-3" style="padding-top: 8px; padding-bottom: 12px;">
  <div class="max-w-6xl mx-auto">

    <div class="bg-gradient-to-r from-gray-800 to-gray-900 px-3 py-2 rounded-lg">
      <div class="flex items-center">
        <i class="fa fa-bar-chart text-white text-base"></i>
        <div class="ml-3">
          <h2 class="text-base font-semibold text-white">Reportes</h2>
          <p class="text-gray-300 text-[11px]">Opciones de reporte</p>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-lg border border-gray-200 mt-2">
      <form method="get" class="p-3">

        <!-- Fila superior: Periodo / Orden / Agrupar / Imprimir -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-3">

          <div class="lg:col-span-3">
            <div class="border border-gray-300 rounded-md p-3">
              <div class="text-xs font-semibold text-gray-800 mb-2">Periodo Fechas</div>
              <div class="grid grid-cols-[1fr_auto_1fr] items-center gap-2">
                <input type="date" name="desde" value="{% now 'Y-m-d' %}" class="w-full min-w-0 border border-gray-300 rounded px-2 py-1 text-sm" />
                <span class="text-gray-500 text-sm">-</span>
                <input type="date" name="hasta" value="{% now 'Y-m-d' %}" class="w-full min-w-0 border border-gray-300 rounded px-2 py-1 text-sm" />
              </div>
            </div>
          </div>

          <div class="lg:col-span-3">
            <div class="border border-gray-300 rounded-md p-3">
              <div class="text-xs font-semibold text-gray-800 mb-2">Ordenado por:</div>
              <div class="space-y-1">
                <label class="flex items-center gap-2 text-sm text-gray-800">
                  <input type="radio" name="ordenado_por" value="secuencia" checked />
                  Secuencia
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800">
                  <input type="radio" name="ordenado_por" value="fecha" />
                  Fecha
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800">
                  <input type="radio" name="ordenado_por" value="cliente" />
                  Cliente
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-2">
            <div class="border border-gray-300 rounded-md p-3">
              <div class="text-xs font-semibold text-gray-800 mb-2">Agrupado por:</div>
              <div class="space-y-1">
                <label class="flex items-center gap-2 text-sm text-gray-800">
                  <input type="radio" name="agrupado_por" value="ninguno" checked />
                  Ninguno
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800">
                  <input type="radio" name="agrupado_por" value="clientes" />
                  Clientes
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4">
            <div class="flex items-start justify-between gap-3">
              <div class="flex flex-col gap-2">
                <button type="submit" name="accion" value="imprimir" class="inline-flex items-center justify-center px-6 py-2 bg-black text-white text-sm font-medium rounded-md">
                  <i class="fa fa-print mr-2"></i>
                  Imprimir
                </button>
              </div>

              <div class="flex flex-col gap-2 pt-1">
                <label class="flex items-center gap-2 text-sm text-gray-800">
                  <input type="checkbox" name="informe_resumido" />
                  Informe Resumido
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800">
                  <input type="checkbox" name="exportar_excel" />
                  Exportar a Excel
                </label>
              </div>
            </div>
          </div>

        </div>

        <!-- Filtros: CI/RUC + búsqueda -->
        <div class="mt-3 grid grid-cols-1 lg:grid-cols-12 gap-3">
          <div class="lg:col-span-4">
            <div class="flex items-center gap-2">
              <label class="text-sm text-gray-800 whitespace-nowrap">C.I/RUC:</label>
              <input type="text" name="ci_ruc" class="flex-1 border border-gray-300 rounded px-2 py-1 text-sm" />
              <button type="submit" name="accion" value="buscar" class="px-3 py-2 border border-gray-300 rounded bg-gray-100">
                <i class="fa fa-search text-gray-700"></i>
              </button>
            </div>
          </div>
          <div class="lg:col-span-8">
            <input type="text" name="cliente_nombre" class="w-full border border-gray-300 rounded px-2 py-1 text-sm bg-gray-100" placeholder="" readonly />
          </div>
        </div>

        <!-- Tipo de facturación / Secuencia inicia -->
        <div class="mt-3 grid grid-cols-1 lg:grid-cols-12 gap-3">
          <div class="lg:col-span-6">
            <div class="flex items-center gap-2">
              <label class="text-sm text-gray-800 whitespace-nowrap">Tipo de Facturación:</label>
              <select name="tipo_facturacion" class="w-full border border-gray-300 rounded px-2 py-1 text-sm">
                <option value="todas" selected>Todas</option>
              </select>
            </div>
          </div>
          <div class="lg:col-span-6">
            <div class="flex items-center gap-2">
              <label class="text-sm text-gray-800 whitespace-nowrap">Secuencia inicia en:</label>
              <input type="text" name="secuencia_inicia" class="w-full border border-gray-300 rounded px-2 py-1 text-sm" />
            </div>
          </div>
        </div>

        <!-- Grillas -->
        <div class="mt-4 grid grid-cols-1 lg:grid-cols-12 gap-3">

          <div class="lg:col-span-4">
            <div class="border border-gray-300 rounded">
              <div class="flex items-center justify-between px-3 py-2 border-b border-gray-300">
                <div class="text-sm font-semibold text-gray-800">Almacenes</div>
                <i class="fa fa-filter text-gray-600"></i>
              </div>
              <div class="p-2">
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="almacenes" value="almacen_general" />
                  Almacén General
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4">
            <div class="border border-gray-300 rounded">
              <div class="flex items-center justify-between px-3 py-2 border-b border-gray-300">
                <div class="text-sm font-semibold text-gray-800">Secuencias</div>
                <i class="fa fa-bars text-gray-600"></i>
              </div>
              <div class="p-2 space-y-1">
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="secuencias" value="facturas_electronicas" />
                  Facturas Electrónicas
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="secuencias" value="notas_credito_electronicas" />
                  Notas de Crédito Electrónicas
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="secuencias" value="notas_debito_electronicas" />
                  Notas de Débito Electrónicas
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4">
            <div class="border border-gray-300 rounded">
              <div class="flex items-center justify-between px-3 py-2 border-b border-gray-300">
                <div class="text-sm font-semibold text-gray-800">Forma de Pago</div>
                <i class="fa fa-bars text-gray-600"></i>
              </div>
              <div class="p-2 space-y-1">
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="formas_pago" value="efectivo" />
                  Efectivo
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="formas_pago" value="credito" />
                  Crédito
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="formas_pago" value="cheque" />
                  Cheque
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="formas_pago" value="tarjeta_credito" />
                  Tarjeta de Crédito
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="formas_pago" value="deposito" />
                  Depósito
                </label>
              </div>
            </div>
          </div>

          <div class="lg:col-span-4">
            <div class="border border-gray-300 rounded">
              <div class="flex items-center justify-between px-3 py-2 border-b border-gray-300">
                <div class="text-sm font-semibold text-gray-800">Facturadores</div>
                <i class="fa fa-filter text-gray-600"></i>
              </div>
              <div class="p-2 space-y-1">
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="facturadores" value="vendedor" />
                  Vendedor
                </label>
                <label class="flex items-center gap-2 text-sm text-gray-800 px-2 py-1">
                  <input type="checkbox" name="facturadores" value="adm" />
                  ADM
                </label>
              </div>
            </div>
          </div>

        </div>

      </form>
    </div>

  </div>
</div>

{% endblock %}
