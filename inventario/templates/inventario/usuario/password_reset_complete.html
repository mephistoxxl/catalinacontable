<!doctype html>
<html lang="es">
{% load static %}
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contraseña actualizada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="border-t-4 border-l border-r border-green-600 rounded-t-3xl p-6 text-center bg-white">
            <img src="{% static 'inventario/assets/logo/logo2.png' %}" alt="Logo" class="mx-auto h-24 w-auto">
            <h1 class="mt-4 text-xl font-semibold text-gray-800">Contraseña actualizada</h1>
        </div>
        <div class="bg-white rounded-b-3xl shadow-xl p-6 border-b border-l border-r border-gray-300 text-center space-y-4">
            <p class="text-sm text-gray-600">Tu contraseña fue configurada correctamente. Ya puedes iniciar sesión con tus nuevas credenciales.</p>
            <a href="{{ login_url }}" class="inline-flex items-center justify-center w-full bg-black hover:bg-gray-800 text-white font-semibold py-2 rounded-lg transition duration-200">
                Ir al inicio de sesión
            </a>
        </div>
    </div>
</body>
</html>
