{% extends "inventario/comun/base.html" %}

{% block content %}
<div class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen py-6">
  <div class="max-w-md mx-auto">
    <!-- Header -->
    <div class="bg-gradient-to-r from-gray-800 to-gray-900 px-6 py-4 rounded-t-lg">
      <div class="flex items-center justify-center">
        <i class="fas fa-user-shield text-white text-2xl mr-3"></i>
        <div>
          <h2 class="text-lg font-semibold text-white">Autenticación de Facturador</h2>
          <p class="text-gray-300 text-xs">Ingrese sus credenciales para continuar</p>
        </div>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white shadow-lg border border-gray-200 rounded-b-lg px-8 py-6">
      {% if messages %}
        {% for message in messages %}
          <div class="mb-4 flex items-center rounded bg-red-100 px-4 py-2 text-red-800 text-sm">
            <i class="fa fa-exclamation-triangle mr-2"></i> {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST" class="space-y-5">
        {% csrf_token %}
        
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña del Facturador</label>
          <input type="password" id="password" name="password" required 
                 class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                 placeholder="Ingrese la contraseña del facturador">
        </div>

        <div class="flex flex-col space-y-3 pt-4">
          <button type="submit" class="w-full inline-flex justify-center items-center px-5 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-gray-900 hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            <i class="fa fa-sign-in mr-2"></i> Iniciar Sesión
          </button>
          
          <a href="{% url 'inventario:emitirFactura' %}" class="w-full inline-flex justify-center items-center px-5 py-2 border border-gray-300 text-sm font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-100">
            <i class="fa fa-arrow-left mr-2"></i> Volver a Emisión
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
