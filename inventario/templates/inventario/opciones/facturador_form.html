{% extends "inventario/comun/base.html" %}

{% block content %}
<!-- ✅ ESTILOS PERSONALIZADOS PARA INPUTS COMPACTOS Y FINOS -->
<style>
    /* Inputs de texto, email, password, number, tel, etc. */
    input[type="text"], 
    input[type="email"], 
    input[type="password"], 
    input[type="number"], 
    input[type="tel"],
    input[type="date"],
    input[type="datetime-local"],
    textarea,
    select {
        width: 100% !important;
        padding: 8px 12px !important;
        border: 0.5px solid #d1d5db !important; /* ✅ BORDE MÁS FINO */
        border-radius: 6px !important;
        font-size: 14px !important;
        background-color: #ffffff !important;
        transition: all 0.2s ease !important;
        box-shadow: none !important;
    }

    /* Estados focus - bordes aún más sutiles */
    input[type="text"]:focus, 
    input[type="email"]:focus, 
    input[type="password"]:focus, 
    input[type="number"]:focus, 
    input[type="tel"]:focus,
    input[type="date"]:focus,
    input[type="datetime-local"]:focus,
    textarea:focus,
    select:focus {
        outline: none !important;
        border-color: #60a5fa !important; /* ✅ AZUL MÁS SUAVE */
        box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.08) !important; /* ✅ SOMBRA MÁS SUTIL */
    }

    /* Estados hover - interacción sutil */
    input[type="text"]:hover, 
    input[type="email"]:hover, 
    input[type="password"]:hover, 
    input[type="number"]:hover, 
    input[type="tel"]:hover,
    input[type="date"]:hover,
    input[type="datetime-local"]:hover,
    textarea:hover,
    select:hover {
        border-color: #9ca3af !important; /* ✅ GRIS MÁS SUAVE AL HOVER */
    }

    /* Selects específicos */
    select {
        background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 12,15 18,9"></polyline></svg>') !important;
        background-repeat: no-repeat !important;
        background-position: right 8px center !important;
        background-size: 16px !important;
        padding-right: 40px !important;
        appearance: none !important;
        -webkit-appearance: none !important;
        -moz-appearance: none !important;
    }

    /* Checkboxes y radios */
    input[type="checkbox"],
    input[type="radio"] {
        width: auto !important;
        margin-right: 8px !important;
        accent-color: #60a5fa !important; /* ✅ AZUL MÁS SUAVE */
    }

    /* Espaciado compacto */
    .space-y-3 > * + * {
        margin-top: 0.75rem !important;
    }

    /* Labels más compactos */
    label {
        margin-bottom: 4px !important;
        font-size: 13px !important;
        font-weight: 600 !important;
    }

    /* Estados disabled más sutiles */
    input:disabled,
    select:disabled,
    textarea:disabled {
        background-color: #f9fafb !important;
        border-color: #e5e7eb !important;
        color: #9ca3af !important;
        cursor: not-allowed !important;
    }

    /* Iconos pequeños y consistentes en labels y títulos */
    label i.fa, label i.fas, .label-icon {
        font-size: 14px !important;
        width: 16px !important;
        height: 16px !important;
        line-height: 16px !important;
        display: inline-block !important;
        text-align: center !important;
        margin-right: 6px !important;
        color: #6b7280 !important; /* text-gray-500 */
    }
    .form-header-icon { font-size: 16px !important; }
</style>

<div class="bg-gray-50 p-3" style="padding-top:8px; padding-bottom:14px;">
    <div class="max-w-5xl mx-auto">
        <!-- Header Section -->
        <div class="bg-gradient-to-r from-gray-800 to-gray-900 px-3 py-2 mb-0 rounded-lg mt-0">
            <div class="flex items-center">
                <div class="flex-shrink-0">
                    <i class="fa fa-user-tie text-white form-header-icon"></i>
                </div>
                <div class="ml-3">
                    <h2 class="text-base font-semibold text-white">Gestión de Facturadores</h2>
                    <p class="text-gray-300 text-[11px]">Complete todos los campos requeridos</p>
                </div>
            </div>
        </div>

        <!-- Main Form -->
        <div class="bg-white rounded-lg shadow-lg border border-gray-200 overflow-hidden mt-2">
            <form method="POST" class="p-3">
                {% csrf_token %}
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <!-- Columna Izquierda -->
                    <div class="space-y-3">
                        <div class="group">
                            <label for="nombres" class="block text-xs font-semibold text-gray-700 mb-1">
                                <i class="fa fa-user label-icon"></i>
                                Nombres
                                <span class="text-red-500">*</span>
                            </label>
                            <input type="text" name="nombres" id="nombres" placeholder="Ingrese el nombre completo" required>
                        </div>

                        <div class="group">
                            <label for="password" class="block text-xs font-semibold text-gray-700 mb-1">
                                <i class="fa fa-lock label-icon"></i>
                                Contraseña
                                <span class="text-red-500">*</span>
                            </label>
                            <input type="password" name="password" id="password" placeholder="Ingrese la contraseña" required minlength="8">
                        </div>

                        <div class="group">
                            <label for="verificar_password" class="block text-xs font-semibold text-gray-700 mb-1">
                                <i class="fa fa-lock label-icon"></i>
                                Verificar Contraseña
                                <span class="text-red-500">*</span>
                            </label>
                            <input type="password" name="verificar_password" id="verificar_password" placeholder="Verifique la contraseña" required minlength="8">
                        </div>
                    </div>

                    <!-- Columna Derecha -->
                    <div class="space-y-3">
                        <div class="group">
                            <label for="descuento_permitido" class="block text-xs font-semibold text-gray-700 mb-1">
                                <i class="fa fa-percentage label-icon"></i>
                                Descuento Permitido
                                <span class="text-red-500">*</span>
                            </label>
                            <input type="number" step="0.01" name="descuento_permitido" id="descuento_permitido" placeholder="Ingrese el descuento permitido" required>
                        </div>

                        <div class="group">
                            <label for="telefono" class="block text-xs font-semibold text-gray-700 mb-1">
                                <i class="fa fa-phone label-icon"></i>
                                Teléfono
                            </label>
                            <input type="text" name="telefono" id="telefono" placeholder="Ingrese el número de teléfono" maxlength="15">
                        </div>

                        <div class="group">
                            <label for="correo" class="block text-xs font-semibold text-gray-700 mb-1">
                                <i class="fa fa-envelope label-icon"></i>
                                Correo
                                <span class="text-red-500">*</span>
                            </label>
                            <input type="email" name="correo" id="correo" placeholder="Ingrese el correo electrónico" required>
                        </div>

                        <div class="group">
                            <div class="flex items-start">
                                <div class="flex items-center h-5">
                                    <input type="checkbox" name="activo" id="activo" checked>
                                </div>
                                <div class="ml-3 text-sm">
                                    <label for="activo" class="font-medium text-gray-700 cursor-pointer text-xs">
                                        Activo
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="mt-5 flex justify-end space-x-2 pt-3 border-t border-gray-200">
                    <a href="/inventario/facturadores" class="inline-flex items-center px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2 transition-all duration-200 border border-gray-300">
                        <i class="fa fa-arrow-left mr-2 text-sm"></i>
                        <span>Cancelar</span>
                    </a>
                    <button type="submit" class="inline-flex items-center px-4 py-2 bg-green-600 text-white text-sm font-medium rounded-lg hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition-all duration-200 shadow-sm">
                        <i class="fa fa-save mr-2 text-sm"></i>
                        <span>Guardar Facturador</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Aplicar clases de Tailwind a los inputs del formulario
        const inputs = document.querySelectorAll('input[type="text"], input[type="email"], input[type="password"], input[type="number"], input[type="tel"], textarea, select');
        inputs.forEach(input => {
            if (!input.classList.contains('form-check-input')) {
                input.className = 'mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm';
            }
        });
        
        // Checkbox styling
        const checkbox = document.querySelector('input[type="checkbox"]');
        if (checkbox) {
            checkbox.className = 'focus:ring-indigo-500 h-4 w-4 text-indigo-600 border-gray-300 rounded';
        }
    });
</script>

{% endblock %}
