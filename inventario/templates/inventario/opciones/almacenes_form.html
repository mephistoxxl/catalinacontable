{% extends "inventario/comun/base.html" %}

{% block content %}
<article class="content forms-page">
    <div class="title-block">
        <h3 class="title">Editar Almacén</h3>
        <p class="title-description">Modifique los datos del almacén seleccionado.</p>
    </div>

    <section class="section">
        <div class="row sameheight-container">
            <div class="col-md-12">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-success">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="card card-block sameheight-item">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="{{ form.descripcion.id_for_label }}">{{ form.descripcion.label }}</label>
                            {{ form.descripcion }}
                        </div>
                        <div class="form-group">
                            <label for="{{ form.activo.id_for_label }}">{{ form.activo.label }}</label>
                            {{ form.activo }}
                        </div>
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                            <a href="{% url 'inventario:gestion_almacenes' %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</article>
{% endblock %}
